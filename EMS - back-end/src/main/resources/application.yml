spring:
  datasource:
    url: jdbc:sqlserver://MSI\SQLEXPRESS;databaseName=EMS;encrypt=true;trustServerCertificate=true
    username: ems_user
    password: admin
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
